<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato | BetAnalise</title>
  <meta name="description" content="Entre em contato com a equipe do BetAnalise." />
  <link rel="canonical" href="https://SEU-DOMINIO.com/contato.html" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d0d0d; color: #e0e0e0; line-height: 1.7; }
    header { background: #1a1a2e; border-bottom: 3px solid #00c853; padding: 16px 20px; }
    header .logo { font-size: 1.4rem; font-weight: 700; color: #00c853; text-decoration: none; }
    header .logo span { color: #f5f5f5; }
    .container { max-width: 600px; margin: 40px auto; padding: 0 16px 60px; }
    h1 { font-size: 1.8rem; color: #f5f5f5; margin-bottom: 10px; }
    p { margin-bottom: 20px; color: #aaa; font-size: 0.95rem; }
    label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #ccc; font-weight: 600; }
    input, textarea {
      width: 100%; padding: 12px 14px; background: #1a1a2e; border: 1px solid #2d2d44;
      border-radius: 8px; color: #e0e0e0; font-size: 0.95rem; margin-bottom: 18px;
      font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: #00c853; }
    textarea { min-height: 130px; resize: vertical; }
    button {
      background: #00c853; color: #000; font-weight: 700; font-size: 1rem;
      padding: 13px 30px; border: none; border-radius: 8px; cursor: pointer; width: 100%;
    }
    button:hover { background: #009624; color: #fff; }
    footer { background: #1a1a2e; padding: 20px; text-align: center; font-size: 0.8rem; color: #555; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">Bet<span>Analise</span></a>
  </header>
  <div class="container">
    <h1>Contato</h1>
    <p>Dúvidas, sugestões ou parcerias? Manda uma mensagem.</p>
    <!-- Para funcionar, use Formspree.io (gratuito) — substitua o action pelo seu endpoint -->
    <form action="https://formspree.io/f/SEU-ID-FORMSPREE" method="POST">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" placeholder="Seu nome" required />

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="seu@email.com" required />

      <label for="mensagem">Mensagem</label>
      <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem..." required></textarea>

      <button type="submit">Enviar Mensagem</button>
    </form>
  </div>
  <footer>© 2025 BetAnalise</footer>
</body>
</html>
